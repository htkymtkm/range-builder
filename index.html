<!DOCTYPE html>

<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Poker Range Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── THEME ── */
:root {
  --bg:#0f1117; --surface:#1a1d27; --s2:#22253a; --s3:#2a2e45;
  --border:#2e3350; --text:#e8eaf0; --t2:#8a90b0; --t3:#555a7a;
  --gold:#f0c040;
  --cell-off:#1e2130; --cell-off-fg:#3a4060; --cell-off-bd:#252840;
  --unfilled:rgba(255,255,255,0.07);
  --shadow:rgba(0,0,0,0.6);
}
[data-theme="light"] {
  --bg:#eef0f8; --surface:#ffffff; --s2:#e4e6f4; --s3:#d4d8ec;
  --border:#bcc0d8; --text:#181b2c; --t2:#4a5078; --t3:#8890b0;
  --gold:#a06800;
  --cell-off:#d8daea; --cell-off-fg:#8890b0; --cell-off-bd:#c0c4d8;
  --unfilled:rgba(0,0,0,0.13);
  --shadow:rgba(0,0,0,0.18);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
font-family:‘Inter’,system-ui,sans-serif;
background:var(–bg); color:var(–text);
min-height:100vh; padding:10px 12px;
transition:background .18s,color .18s;
-webkit-tap-highlight-color:transparent;
/* prevent long-press callout on iOS */
-webkit-touch-callout:none;
user-select:none;
}

/* ── TITLEBAR ── */
.titlebar { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.title {
font-family:‘JetBrains Mono’,monospace;
font-size:15px; font-weight:600; letter-spacing:.07em;
color:var(–text); flex:1; white-space:nowrap;
}
.save-dot {
display:inline-block; width:6px; height:6px; border-radius:50%;
background:#30c890; margin-left:7px; opacity:0;
transition:opacity .3s; vertical-align:middle;
}
.save-dot.on { opacity:1; }
.tb-right { display:flex; gap:5px; align-items:center; }

/* ── ICON BUTTON ── */
.icon-btn {
width:32px; height:32px; border-radius:7px;
border:1px solid var(–border); background:var(–surface);
color:var(–t2); cursor:pointer;
display:flex; align-items:center; justify-content:center;
transition:background .1s,color .1s; flex-shrink:0;
}
.icon-btn:hover,.icon-btn:active { background:var(–s2); color:var(–text); }
.icon-btn.danger:hover,.icon-btn.danger:active { background:#2a1010; color:#f08080; border-color:#6e2828; }
.icon-btn svg {
width:15px; height:15px; stroke:currentColor; fill:none;
stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round;
pointer-events:none;
}

/* ── GEAR DROPDOWN ── */
.gear-wrap { position:relative; }
.gear-dd {
position:absolute; right:0; top:36px;
background:var(–surface); border:1px solid var(–border);
border-radius:11px; padding:8px; min-width:220px;
z-index:600; box-shadow:0 10px 36px var(–shadow);
display:none;
}
.gear-dd.open { display:block; }
.dd-sec {
font-size:10px; color:var(–t3); padding:5px 8px 3px;
letter-spacing:.07em; text-transform:uppercase;
display:flex; align-items:center; gap:6px;
}
.dd-sep { height:1px; background:var(–border); margin:5px 2px; }
.dd-crow { display:flex; align-items:center; gap:7px; padding:3px 6px; }
.dd-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dd-inp {
flex:1; padding:3px 7px; background:var(–s3);
border:1px solid var(–border); border-radius:4px;
color:var(–text); font-size:12px;
font-family:‘Inter’,system-ui,sans-serif;
-webkit-user-select:text; user-select:text;
}
.dd-inp:focus { outline:none; border-color:var(–t2); }
.theme-toggle { display:flex; border:1px solid var(–border); border-radius:5px; overflow:hidden; margin-left:auto; }
.theme-opt {
padding:3px 10px; font-size:11px; cursor:pointer;
background:transparent; color:var(–t3); border:none;
font-family:‘Inter’,system-ui,sans-serif;
}
.theme-opt.active { background:var(–s3); color:var(–text); }
.dd-btn {
width:100%; padding:6px 8px; border-radius:5px; border:none;
background:transparent; color:var(–t2); font-size:12px; cursor:pointer;
text-align:left; font-family:‘Inter’,system-ui,sans-serif;
display:flex; align-items:center; gap:7px;
}
.dd-btn:hover,.dd-btn:active { background:var(–s2); color:var(–text); }
.dd-btn svg {
width:13px; height:13px; stroke:currentColor; fill:none;
stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0;
}

/* ── LAYOUT: title → grid → color-bar → right-col ── */
.grid-section { margin-bottom:10px; width:100%; }

/* ── COLOR BAR (below grid) ── */
.color-section {
display:flex; flex-wrap:wrap; gap:8px; align-items:flex-start;
margin-bottom:10px;
}
.color-bar { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.color-btn {
width:26px; height:26px; border-radius:50%;
border:2.5px solid transparent; cursor:pointer;
transition:transform .1s,border-color .1s; flex-shrink:0;
-webkit-tap-highlight-color:transparent;
}
.color-btn:hover,.color-btn:active { transform:scale(1.14); }
.color-btn.sel { border-color:var(–text); transform:scale(1.22); }

/* clear-selected button */
.clear-sel-btn {
padding:5px 11px; border-radius:20px; cursor:pointer;
font-size:11px; font-family:‘Inter’,system-ui,sans-serif; font-weight:500;
border:1px solid var(–border); background:var(–surface); color:var(–t2);
transition:background .1s,color .1s; white-space:nowrap;
}
.clear-sel-btn:hover,.clear-sel-btn:active { background:var(–s2); color:var(–text); }

/* ── GRID ── */
#captureRoot { border-radius:6px; padding:6px; width:100%; }
[data-theme=“dark”] #captureRoot { background:#0f1117; }
[data-theme=“light”] #captureRoot { background:#eef0f8; }

.grid { display:grid; grid-template-columns:repeat(13,1fr); gap:2px; width:100%; }

.cell {
width:100%; aspect-ratio:11/9;
display:flex; align-items:center; justify-content:center;
font-size:clamp(6px,1.6vw,11.5px); font-weight:800;
font-family:‘JetBrains Mono’,monospace;
cursor:pointer; border-radius:3px;
position:relative; user-select:none;
border:1px solid transparent;
transition:transform .07s,box-shadow .07s;
overflow:hidden;
-webkit-touch-callout:none;
-webkit-user-select:none;
touch-action:manipulation;
}
.cell:active { transform:scale(0.95); }
.cell.hover-scale { transform:scale(1.12); z-index:20; box-shadow:0 2px 14px var(–shadow); }

.cell.off {
background:var(–cell-off);
color:var(–cell-off-fg);
border-color:var(–cell-off-bd);
}

/* ── NO TEXT SHADOW ── */
.cell .cell-label { position:relative; z-index:1; pointer-events:none; letter-spacing:-.4px; }

/* checked = gold text, no shadow */
.cell.checked .cell-label { color:var(–gold) !important; font-weight:800; }
.cell.checked::after {
content:‘✓’; position:absolute; top:1px; right:2px;
font-size:7px; color:var(–gold);
}

.cell-bg { position:absolute; inset:0; display:flex; }
.cell-seg { height:100%; }
.cell-unfilled { height:100%; background:var(–unfilled); }

/* long-press ripple */
.cell.pressing::before {
content:’’; position:absolute; inset:0;
background:rgba(255,255,255,0.15);
border-radius:3px; pointer-events:none;
animation:pressAnim 500ms linear forwards;
}
@keyframes pressAnim {
0%   { opacity:0; }
30%  { opacity:1; }
100% { opacity:0.6; }
}

/* ── BOTTOM PANEL (stats + legend) ── */
.bottom-row { display:flex; gap:10px; flex-wrap:wrap; }
.card {
background:var(–surface); border:1px solid var(–border);
border-radius:10px; padding:11px 13px; flex:1 1 200px; min-width:0;
}
.card-title { font-size:10px; color:var(–t3); margin-bottom:8px; letter-spacing:.07em; text-transform:uppercase; }

/* legend */
.legend-items { display:flex; flex-direction:column; gap:3px; }
.legend-item {
display:flex; align-items:center; gap:7px;
padding:4px 6px; border-radius:5px; cursor:pointer;
border:1px solid transparent; transition:background .1s;
}
.legend-item:hover,.legend-item:active { background:var(–s2); }
.legend-item.sel { border-color:var(–border); background:var(–s2); }
.ldot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.lname { font-size:12px; color:var(–text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lpct { font-size:11px; font-family:‘JetBrains Mono’,monospace; color:var(–t3); flex-shrink:0; }

/* stats */
.range-pct { font-family:‘JetBrains Mono’,monospace; font-size:24px; font-weight:600; color:var(–text); margin-bottom:3px; }
.range-combos { font-size:11px; color:var(–t2); margin-bottom:8px; }
.color-stats { display:flex; flex-direction:column; gap:4px; }
.cstat { display:flex; align-items:center; gap:6px; }
.cstat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cstat-name { font-size:11px; color:var(–t2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cstat-val { font-size:11px; font-family:‘JetBrains Mono’,monospace; color:var(–text); flex-shrink:0; }

/* export row */
.export-row { margin-top:10px; }
.export-btn {
padding:8px 12px; border-radius:7px; cursor:pointer;
font-size:12px; font-family:‘Inter’,system-ui,sans-serif; font-weight:500;
border:1px solid #405a30; color:#60c840; background:#182810;
width:100%; display:flex; align-items:center; justify-content:center; gap:7px;
transition:background .1s;
}
.export-btn:hover,.export-btn:active { background:#203818; }
.export-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; }
[data-theme=“light”] .export-btn { background:#d0f0b8; color:#286010; border-color:#80c040; }
[data-theme=“light”] .export-btn:hover { background:#bce0a0; }

/* ── CONTEXT MENU ── */
.ctx-menu {
position:fixed;
left:50%; top:50%;
transform:translate(-50%,-50%);
background:var(–surface);
border:1px solid var(–border);
border-radius:14px;
padding:8px 6px 10px;
z-index:1000;
width:min(340px,92vw);
box-shadow:0 12px 48px var(–shadow);
display:none;
}
.ctx-menu.open {
display:block;
animation:popIn .18s ease forwards;
}
@keyframes popIn {
from { opacity:0; transform:translate(-50%,-50%) scale(0.95); }
to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
}
.ctx-overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.45);
z-index:999; display:none;
}
.ctx-overlay.open { display:block; }
.ctx-header {
display:flex; align-items:center;
border-bottom:1px solid var(–border); margin-bottom:5px; padding:4px 6px 8px;
}
.ctx-title {
font-family:‘JetBrains Mono’,monospace; font-size:12px; font-weight:600;
color:var(–text); flex:1;
}
.ctx-close-btn {
width:24px; height:24px; border-radius:5px; border:1px solid var(–border);
background:var(–s2); color:var(–t2); cursor:pointer;
display:flex; align-items:center; justify-content:center; flex-shrink:0;
transition:background .1s, color .1s;
}
.ctx-close-btn:hover,.ctx-close-btn:active { background:var(–s3); color:var(–text); }
.freq-error {
font-size:10px; color:#ff5522; font-weight:600; margin-left:4px;
opacity:0; transition:opacity .15s;
}
.freq-error.show { opacity:1; }
.finput.err { border-color:#ff5522; background:#2a1208; }
[data-theme=“light”] .finput.err { border-color:#cc2200; background:#ffe8e0; }
.dd-btn-danger { color:#e86060 !important; }
.dd-btn-danger:hover,.dd-btn-danger:active { background:#2a1010 !important; color:#ff8080 !important; }
.ctx-sec { font-size:10px; color:var(–t3); padding:4px 8px 2px; letter-spacing:.05em; }
.freq-row { display:flex; align-items:center; gap:6px; padding:3px 6px; border-radius:4px; }
.freq-row:hover { background:var(–s2); }
.fdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.fname { font-size:11px; color:var(–t2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.finput {
width:50px; font-size:11px; font-family:‘JetBrains Mono’,monospace;
padding:2px 5px; background:var(–s3); border:1px solid var(–border);
border-radius:3px; color:var(–text); text-align:right;
-webkit-user-select:text; user-select:text;
}
.finput:focus { outline:none; border-color:var(–t2); }
.fpct { font-size:10px; color:var(–t3); }
.fbar-wrap { padding:4px 8px 4px; }
.fbar { display:flex; height:6px; border-radius:3px; overflow:hidden; background:var(–s3); }
.fbar-seg { height:100%; }
.freq-total-row {
display:flex; align-items:center; gap:6px;
padding:5px 8px 4px; border-top:1px solid var(–border); margin-top:3px;
}
.freq-total-lbl { font-size:10px; color:var(–t3); flex:1; }
.freq-total-val { font-size:12px; font-family:‘JetBrains Mono’,monospace; font-weight:600; }
.ctx-check-row {
display:flex; align-items:center; gap:8px;
padding:6px 8px; border-top:1px solid var(–border); margin-top:3px;
cursor:pointer; border-radius:4px;
}
.ctx-check-row:hover,.ctx-check-row:active { background:var(–s2); }
.ctx-cb {
width:14px; height:14px; border:1px solid var(–border);
border-radius:3px; background:var(–s3);
display:flex; align-items:center; justify-content:center;
font-size:10px; color:var(–gold); flex-shrink:0;
}
.ctx-cb-lbl { font-size:11px; color:var(–t2); }
.ctx-rm {
width:100%; padding:5px; margin-top:4px;
background:transparent; border:1px solid #6e2828;
border-radius:4px; color:#e86060; font-size:11px; cursor:pointer;
font-family:‘Inter’,system-ui,sans-serif; transition:background .1s;
}
.ctx-rm:hover,.ctx-rm:active { background:#3a1515; }

/* long-press hint tooltip */
.lp-hint {
position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
background:var(–surface); border:1px solid var(–border);
border-radius:20px; padding:6px 14px; font-size:11px; color:var(–t2);
z-index:900; pointer-events:none; opacity:0; transition:opacity .3s;
white-space:nowrap;
}
.lp-hint.show { opacity:1; }

/* permanent hint bar at bottom */
.hint-bar {
margin-top:10px; padding:6px 10px;
font-size:10px; color:var(–t3);
text-align:center; letter-spacing:.04em;
}

/* ── TOAST ── */
.toast {
position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
background:var(–surface); border:1px solid var(–border);
border-radius:8px; padding:9px 18px; font-size:12px; color:var(–text);
z-index:2000; display:none; box-shadow:0 4px 20px var(–shadow);
white-space:nowrap; pointer-events:none;
}
.toast.show { display:block; }

/* cells are fluid via aspect-ratio - no fixed-size breakpoint needed */
</style>

</head>
<body>

<!-- ════ TITLEBAR ════ -->

<div class="titlebar">
  <span class="title">POKER RANGE BUILDER<span class="save-dot" id="saveDot"></span></span>
  <div class="tb-right">
    <button class="icon-btn danger" onclick="clearAll()" title="Clear all hands">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
    </button>
    <!-- GEAR -->
    <div class="gear-wrap" id="gearWrap">
      <button class="icon-btn" onclick="toggleGear()" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <div class="gear-dd" id="gearDD">
        <div class="dd-sec">Edit color names</div>
        <div id="ddColorRows"></div>
        <div class="dd-sep"></div>
        <div class="dd-sec">Theme
          <div class="theme-toggle">
            <button class="theme-opt active" id="btnDark"  onclick="setTheme('dark')">Dark</button>
            <button class="theme-opt"        id="btnLight" onclick="setTheme('light')">Light</button>
          </div>
        </div>
        <div class="dd-sep"></div>
        <div class="dd-sec">Export</div>
        <button class="dd-btn" onclick="exportPng();closeGear()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG (current theme)
        </button>
        <div class="dd-sep"></div>
        <button class="dd-btn dd-btn-danger" onclick="resetAll();closeGear()">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          Reset to defaults
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ════ GRID ════ -->

<div class="grid-section">
  <div id="captureRoot">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- ════ COLOR BAR (below grid) ════ -->

<div class="color-section">
  <div class="color-bar" id="colorBar"></div>
  <button class="clear-sel-btn" id="clearSelBtn" onclick="clearSelected()">Clear selected</button>
</div>

<!-- ════ RANGE STATS ════ -->

<div class="bottom-row" id="statsSection">
  <div class="card">
    <div class="card-title">Range Stats</div>
    <div class="range-pct"    id="rangePct">0.0%</div>
    <div class="range-combos" id="rangeCombos">0.0 / 1326 combos</div>
    <div class="color-stats"  id="colorStats"></div>
    <div class="export-row">
      <button class="export-btn" onclick="exportPng()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
    </div>
  </div>
</div>

<!-- ════ HINT (bottom) ════ -->

<div class="hint-bar">Tap: assign color &nbsp;|&nbsp; Hold: set frequency</div>

<!-- ════ OVERLAY + CONTEXT MENU ════ -->

<div class="ctx-overlay" id="ctxOverlay" onclick="closeCtx()"></div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-header">
    <div class="ctx-title" id="ctxTitle">Hand</div>
    <button class="ctx-close-btn" onclick="closeCtx()">
      <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="ctx-sec">Frequency per color (%)</div>
  <div id="ctxFreqRows"></div>
  <div class="fbar-wrap"><div class="fbar" id="ctxFbar"></div></div>
  <div class="freq-total-row">
    <span class="freq-total-lbl">Total</span>
    <span class="freq-total-val" id="ctxTotal">0%</span>
    <span class="freq-error" id="ctxError"></span>
  </div>
  <div class="ctx-check-row" onclick="toggleCheck()">
    <div class="ctx-cb" id="ctxCb"></div>
    <span class="ctx-cb-lbl">Checkmark (gold text)</span>
  </div>
  <button class="ctx-rm" onclick="removeHand()">Remove this hand</button>
</div>

<!-- long-press hint (iOS) -->

<div class="lp-hint" id="lpHint">Hold a cell to open frequency settings</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];

// 7 colors: Gray (None) added
const COLORS = [
  { id:1, name:'5bet+',            bright:'#cc2255' },
  { id:2, name:'4bet Allin',       bright:'#b090e0' },
  { id:3, name:'4bet / 5bet fold', bright:'#ff5522' },
  { id:4, name:'3bet call',        bright:'#4090ff' },
  { id:5, name:'RFI / 3bet fold',  bright:'#f0c800' },
  { id:6, name:'Call',             bright:'#30c890' },
  { id:7, name:'None',             bright:'#606880' },
];

const HS = {};
RANKS.forEach((_,r) => RANKS.forEach((_,c) => { HS[`${r}_${c}`] = { colors:{}, checked:false }; }));

let SEL = 1;
let ctxKey = null;

/* ── helpers ── */
function hn(r,c) {
  if (r===c) return RANKS[r]+RANKS[c];
  if (r<c)  return RANKS[r]+RANKS[c]+'s';
  return RANKS[c]+RANKS[r]+'o';
}
function hc(r,c) { return r===c ? 6 : r<c ? 4 : 12; }
function active(k) { return Object.values(HS[k].colors).some(v=>v>0); }
function getCol(id) { return COLORS[id-1]; }

/* ── LOCAL STORAGE ── */
const LS_KEY = 'prb_v4';

function saveLS() {
  try {
    const data = {
      names : COLORS.map(c=>c.name),
      theme : document.documentElement.dataset.theme,
      hs    : {}
    };
    RANKS.forEach((_,r) => RANKS.forEach((_,c) => {
      const k=`${r}_${c}`, s=HS[k];
      if (active(k)||s.checked) data.hs[k] = { colors:{...s.colors}, checked:s.checked };
    }));
    localStorage.setItem(LS_KEY, JSON.stringify(data));
    const dot = document.getElementById('saveDot');
    dot.classList.add('on');
    clearTimeout(dot._t);
    dot._t = setTimeout(()=>dot.classList.remove('on'), 1300);
  } catch(e) {}
}
let _st;
function sched() { clearTimeout(_st); _st = setTimeout(saveLS, 500); }

function loadLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.theme) setTheme(d.theme, true);
    if (d.names) d.names.forEach((n,i) => { if (COLORS[i]) COLORS[i].name = n; });
    if (d.hs) Object.entries(d.hs).forEach(([k,v]) => {
      if (HS[k]) HS[k] = { colors:v.colors||{}, checked:!!v.checked };
    });
  } catch(e) {}
}

/* ── THEME ── */
function setTheme(t, skip) {
  document.documentElement.dataset.theme = t;
  document.getElementById('btnDark').classList.toggle('active',  t==='dark');
  document.getElementById('btnLight').classList.toggle('active', t==='light');
  if (!skip) sched();
}

/* ── GEAR ── */
function toggleGear() {
  const dd = document.getElementById('gearDD');
  if (dd.classList.toggle('open')) buildDdRows();
}
function closeGear() { document.getElementById('gearDD').classList.remove('open'); }

document.addEventListener('click', e => {
  if (!e.target.closest('#gearWrap')) closeGear();
  if (!e.target.closest('#ctxMenu') && !e.target.closest('.cell')) closeCtx();
});

function buildDdRows() {
  const el = document.getElementById('ddColorRows');
  el.innerHTML = '';
  COLORS.forEach(c => {
    const row = document.createElement('div');
    row.className = 'dd-crow';
    row.innerHTML = `<div class="dd-dot" style="background:${c.bright}"></div><input class="dd-inp" type="text" value="${c.name}">`;
    row.querySelector('input').addEventListener('input', function() {
      c.name = this.value;
      buildLegend(); setColor(SEL); updateStats(); sched();
    });
    el.appendChild(row);
  });
}

/* ── COLOR BAR ── */
function buildColorBar() {
  const bar = document.getElementById('colorBar');
  bar.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'color-btn' + (c.id===SEL?' sel':'');
    btn.style.background = c.bright;
    btn.title = c.name;
    btn.addEventListener('click', () => setColor(c.id));
    bar.appendChild(btn);
  });
  updateClearSelBtn();
}

function updateClearSelBtn() {
  const c = getCol(SEL);
  document.getElementById('clearSelBtn').textContent = `Clear "${c.name}"`;
}

/* ── LEGEND (no-op: legendItems element removed) ── */
function buildLegend() { /* legend panel removed; stats card shows color names */ }

function setColor(id) {
  SEL = id;
  document.querySelectorAll('.color-btn').forEach((b,i) => b.classList.toggle('sel', COLORS[i].id===id));
  updateClearSelBtn();
}

/* ── GRID ── */
function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => {
    const k = `${ri}_${ci}`;
    const cell = document.createElement('div');
    cell.className = 'cell off';
    cell.id = 'cell_'+k;
    cell.innerHTML = `<div class="cell-bg" id="bg_${k}"></div><span class="cell-label" id="lbl_${k}">${hn(ri,ci)}</span>`;
    attachCellEvents(cell, k);
    g.appendChild(cell);
  }));
}

/* ── CELL EVENTS: click + long-press (touch & mouse) ── */
function attachCellEvents(cell, k) {
  let pressTimer = null;
  let didLongPress = false;

  function startPress(e) {
    didLongPress = false;
    cell.classList.add('pressing');
    pressTimer = setTimeout(() => {
      didLongPress = true;
      cell.classList.remove('pressing');
      const fakeEv = { clientX: e.touches ? e.touches[0].clientX : e.clientX,
                       clientY: e.touches ? e.touches[0].clientY : e.clientY };
      openCtx(k, fakeEv);
    }, 300);
  }
  function cancelPress() {
    clearTimeout(pressTimer);
    cell.classList.remove('pressing');
  }

  // Touch
  cell.addEventListener('touchstart', e => { e.preventDefault(); startPress(e); }, { passive:false });
  cell.addEventListener('touchend',   e => {
    e.preventDefault();
    cancelPress();
    if (!didLongPress) handleClick(k);
  });
  cell.addEventListener('touchmove',  e => { cancelPress(); }, { passive:true });
  cell.addEventListener('touchcancel',()  => cancelPress());

  // Mouse (desktop)
  cell.addEventListener('mousedown', e => { if (e.button===0) startPress(e); });
  cell.addEventListener('mouseup',   e => {
    cancelPress();
    if (!didLongPress && e.button===0) handleClick(k);
  });
  cell.addEventListener('mouseleave', cancelPress);
  cell.addEventListener('contextmenu', e => { e.preventDefault(); openCtx(k, e); });
}

/* ── UPDATE CELL VISUAL ── */
function updateCell(k) {
  const cell = document.getElementById('cell_'+k);
  const bg   = document.getElementById('bg_'+k);
  const lbl  = document.getElementById('lbl_'+k);
  const s    = HS[k];
  const on   = active(k);

  cell.className = 'cell' + (on?'':' off') + (s.checked?' checked':'');
  lbl.style.color = '';
  if (!on) { bg.innerHTML=''; return; }

  const entries = Object.entries(s.colors).filter(([,v])=>v>0);
  const total   = entries.reduce((a,[,v])=>a+v, 0);
  bg.innerHTML = '';

  entries.forEach(([cid, val]) => {
    const seg = document.createElement('div');
    seg.className = 'cell-seg';
    seg.style.width = val + '%';
    seg.style.background = getCol(parseInt(cid)).bright;
    bg.appendChild(seg);
  });

  if (total < 100) {
    const rem = document.createElement('div');
    rem.className = 'cell-unfilled';
    rem.style.width = (100-total) + '%';
    bg.appendChild(rem);
  }

  if (s.checked) lbl.style.color = 'var(--gold)';
}

/* ── CLICK HANDLER ── */
function handleClick(k) {
  const s = HS[k];
  if (!active(k)) {
    s.colors = { [SEL]: 100 };
  } else if ((s.colors[SEL]||0) > 0) {
    delete s.colors[SEL];
  } else {
    s.colors[SEL] = 50;
  }
  updateCell(k); updateStats(); sched();
}

/* ── CONTEXT MENU ── */
function openCtx(k, e) {
  ctxKey = k;
  const [ri,ci] = k.split('_').map(Number);
  const s = HS[k];
  if (!active(k)) { s.colors = { [SEL]:100 }; updateCell(k); updateStats(); }
  document.getElementById('ctxTitle').textContent = hn(ri,ci) + ' - 頻度設定';
  renderCtxRows(k);
  const m = document.getElementById('ctxMenu');
  const o = document.getElementById('ctxOverlay');
  m.style.display = 'block';
  o.style.display = 'block';
  // position is fixed at screen center via CSS
  requestAnimationFrame(() => { m.classList.add('open'); o.classList.add('open'); });
}

function renderCtxRows(k) {
  const s    = HS[k];
  const rows = document.getElementById('ctxFreqRows');
  rows.innerHTML = '';
  COLORS.forEach(c => {
    const val = s.colors[c.id] || 0;
    const row = document.createElement('div');
    row.className = 'freq-row';
    row.innerHTML = `<div class="fdot" style="background:${c.bright}"></div><span class="fname">${c.name}</span><input class="finput" type="number" min="0" max="100" step="5" value="${val}"><span class="fpct">%</span>`;
    const inp = row.querySelector('input');
    inp.addEventListener('input', function() {
      setFreq(k, c.id, this.value, this);
    });
    rows.appendChild(row);
  });
  renderFbar(k);
  document.getElementById('ctxCb').textContent = s.checked ? '✓' : '';
}

function setFreq(k, cid, val, inputEl) {
  const s = HS[k];
  val = Math.max(0, Math.min(100, parseInt(val)||0));

  // tentatively apply
  const prev = s.colors[cid] || 0;
  if (val===0) delete s.colors[cid];
  else s.colors[cid] = val;

  // check total
  const total = Object.values(s.colors).reduce((a,v)=>a+v, 0);
  const errEl = document.getElementById('ctxError');

  if (total > 100) {
    // revert
    if (prev===0) delete s.colors[cid];
    else s.colors[cid] = prev;
    if (inputEl) inputEl.classList.add('err');
    if (errEl) { errEl.textContent = `Total ${total}% exceeds 100%`; errEl.classList.add('show'); }
    renderFbar(k);
    return;
  }

  // clear error on all inputs
  if (inputEl) inputEl.classList.remove('err');
  document.querySelectorAll('.finput').forEach(el => el.classList.remove('err'));
  if (errEl) { errEl.textContent = ''; errEl.classList.remove('show'); }

  renderFbar(k);
  updateCell(k); updateStats(); sched();
}

function renderFbar(k) {
  const s   = HS[k];
  const bar = document.getElementById('ctxFbar');
  const tv  = document.getElementById('ctxTotal');
  bar.innerHTML = '';
  const entries = Object.entries(s.colors).filter(([,v])=>v>0);
  const total   = entries.reduce((a,[,v])=>a+v, 0);
  tv.textContent = total + '%';
  tv.style.color = (total===0||total===100) ? 'var(--text)' : '#f0c800';
  if (!total) return;
  entries.forEach(([cid,val]) => {
    const seg = document.createElement('div');
    seg.className = 'fbar-seg';
    seg.style.width = (val/total*100) + '%';
    seg.style.background = getCol(parseInt(cid)).bright;
    bar.appendChild(seg);
  });
}

function toggleCheck() {
  if (!ctxKey) return;
  HS[ctxKey].checked = !HS[ctxKey].checked;
  document.getElementById('ctxCb').textContent = HS[ctxKey].checked ? '✓' : '';
  updateCell(ctxKey); sched();
}

function removeHand() {
  if (!ctxKey) return;
  HS[ctxKey] = { colors:{}, checked:false };
  updateCell(ctxKey); updateStats(); sched(); closeCtx();
}

function closeCtx() {
  const m = document.getElementById('ctxMenu');
  const o = document.getElementById('ctxOverlay');
  m.classList.remove('open'); o.classList.remove('open');
  m.style.display = 'none';  o.style.display = 'none';
  ctxKey = null;
}

/* ── STATS ── */
function updateStats() {
  const by = {}; COLORS.forEach(c => by[c.id]=0);
  let overall = 0;
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => {
    const k=`${ri}_${ci}`, s=HS[k], combos=hc(ri,ci);
    const entries = Object.entries(s.colors).filter(([,v])=>v>0);
    const sum     = entries.reduce((a,[,v])=>a+v, 0);
    if (!sum) return;
    entries.forEach(([cid,val]) => {
      const eff = (val/sum)*combos;
      by[parseInt(cid)] += eff; overall += eff;
    });
  }));
  document.getElementById('rangePct').textContent    = (overall/1326*100).toFixed(1)+'%';
  document.getElementById('rangeCombos').textContent = overall.toFixed(1)+' / 1326 combos';
  const el = document.getElementById('colorStats');
  el.innerHTML = '';
  COLORS.forEach(c => {
    const v = by[c.id];
    if (v < 0.05) return;
    const row = document.createElement('div');
    row.className = 'cstat';
    row.innerHTML = `<div class="cstat-dot" style="background:${c.bright}"></div><span class="cstat-name">${c.name}</span><span class="cstat-val">${v.toFixed(1)} (${(v/1326*100).toFixed(1)}%)</span>`;
    el.appendChild(row);
  });
}

/* ── BULK OPS ── */
function selectAll() {
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => {
    const k = `${ri}_${ci}`;
    if (!active(k)) { HS[k].colors = { [SEL]:100 }; updateCell(k); }
  }));
  updateStats(); sched();
}
function clearAll() {
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => {
    const k=`${ri}_${ci}`;
    HS[k] = { colors:{}, checked:false }; updateCell(k);
  }));
  updateStats(); sched();
}

/* ── RESET TO DEFAULTS ── */
const DEFAULT_NAMES = ['5bet+','4bet Allin','4bet / 5bet fold','3bet call','RFI / 3bet fold','Call','None'];
function resetAll() {
  if (!confirm('Reset all hand data and color names to defaults?')) return;
  // Clear localStorage first so loadLS won't restore old data
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  // Reset color names
  COLORS.forEach((c,i) => { c.name = DEFAULT_NAMES[i]; });
  // Reset all hand state
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => {
    HS[`${ri}_${ci}`] = { colors:{}, checked:false };
  }));
  // Reset selected color
  SEL = 1;
  // Reset theme
  setTheme('dark', true);
  // Rebuild everything
  buildColorBar();
  buildLegend();
  buildGrid();
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => updateCell(`${ri}_${ci}`)));
  updateStats();
  showToast('Reset to defaults');
}

/* ── CLEAR SELECTED COLOR ── */
function clearSelected() {
  RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => {
    const k = `${ri}_${ci}`, s = HS[k];
    if ((s.colors[SEL]||0) > 0) {
      delete s.colors[SEL];
      updateCell(k);
    }
  }));
  updateStats(); sched();
}

/* ── EXPORT ── */
async function exportPng() {
  showToast('Generating image…');
  try {
    const theme = document.documentElement.dataset.theme;
    const bg    = theme==='light' ? '#eef0f8' : '#0f1117';

    // Wrap grid + stats into a temporary container for capture
    const grid   = document.getElementById('captureRoot');
    const stats  = document.getElementById('statsSection');
    const wrap   = document.createElement('div');
    wrap.style.cssText = `background:${bg};padding:14px;border-radius:8px;display:inline-block;`;

    // Clone both sections
    const gridClone  = grid.cloneNode(true);
    const statsClone = stats.cloneNode(true);
    statsClone.style.marginTop = '12px';
    wrap.appendChild(gridClone);
    wrap.appendChild(statsClone);

    // Temporarily attach off-screen
    wrap.style.position = 'fixed';
    wrap.style.left = '-9999px';
    wrap.style.top  = '0';
    document.body.appendChild(wrap);

    const canvas = await html2canvas(wrap, {
      backgroundColor: bg, scale: 2, useCORS: true, logging: false
    });
    document.body.removeChild(wrap);

    const a = document.createElement('a');
    a.download = `poker-range-${theme}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    showToast('PNG downloaded ✓');
  } catch(err) {
    showToast('Error: '+err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid = setTimeout(()=>t.classList.remove('show'), 2800);
}

/* ── iOS HINT (show once) ── */
function maybeShowHint() {
  if (localStorage.getItem('prb_hint_shown')) return;
  const h = document.getElementById('lpHint');
  h.classList.add('show');
  setTimeout(()=>h.classList.remove('show'), 3500);
  localStorage.setItem('prb_hint_shown','1');
}

/* ── INIT ── */
loadLS();
buildColorBar();
buildLegend();
buildGrid();
RANKS.forEach((_,ri) => RANKS.forEach((_,ci) => updateCell(`${ri}_${ci}`)));
updateStats();
setTimeout(maybeShowHint, 1500);
</script>
