<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Range Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22253a; --surface3:#2a2e45;
  --border:#2e3350; --text:#e8eaf0; --text2:#8a90b0; --text3:#555a7a;
  --gold:#f0c040; --cell-off:#22253a; --cell-off-text:#555a7a;
  --cell-off-border:#2e3350; --unfilled:rgba(255,255,255,0.06);
}
[data-theme="light"] {
  --bg:#f0f2f8; --surface:#ffffff; --surface2:#e8eaf4; --surface3:#d8dcea;
  --border:#c0c4dc; --text:#1a1d2e; --text2:#505880; --text3:#909ab8;
  --gold:#b07800; --cell-off:#dde0ee; --cell-off-text:#909ab8;
  --cell-off-border:#c0c4dc; --unfilled:rgba(0,0,0,0.12);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh; padding:12px 16px;
  transition:background .2s,color .2s;
}

/* TITLEBAR */
.titlebar { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.title { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:600; letter-spacing:.06em; color:var(--text); flex:1; }
.save-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#30c890; margin-left:6px; opacity:0; transition:opacity .3s; vertical-align:middle; }
.save-dot.on { opacity:1; }
.icon-btn {
  width:34px; height:34px; border-radius:7px; border:1px solid var(--border);
  background:var(--surface); color:var(--text2); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:16px;
  transition:background .1s,color .1s; flex-shrink:0;
}
.icon-btn:hover { background:var(--surface2); color:var(--text); }
.icon-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

/* GEAR DROPDOWN */
.gear-wrap { position:relative; }
.gear-dd {
  position:absolute; right:0; top:38px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:8px; min-width:210px;
  z-index:500; box-shadow:0 8px 32px rgba(0,0,0,.55); display:none;
}
.gear-dd.open { display:block; }
.dd-sec { font-size:10px; color:var(--text3); padding:6px 8px 3px; letter-spacing:.06em; text-transform:uppercase; }
.dd-sep { height:1px; background:var(--border); margin:5px 0; }
.dd-crow { display:flex; align-items:center; gap:7px; padding:4px 8px; border-radius:5px; }
.dd-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dd-inp {
  flex:1; padding:3px 7px; background:var(--surface3); border:1px solid var(--border);
  border-radius:4px; color:var(--text); font-size:12px; font-family:'Noto Sans JP',sans-serif;
}
.dd-btn {
  width:100%; padding:6px 8px; border-radius:5px; border:none;
  background:transparent; color:var(--text2); font-size:12px; cursor:pointer;
  text-align:left; font-family:'Noto Sans JP',sans-serif;
  display:flex; align-items:center; gap:7px;
}
.dd-btn:hover { background:var(--surface2); color:var(--text); }
.dd-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
.dd-btn.danger { color:#e86060; }
.dd-btn.danger:hover { background:#3a1515; }
.theme-toggle { display:flex; border:1px solid var(--border); border-radius:5px; overflow:hidden; margin-left:auto; }
.theme-opt { padding:3px 9px; font-size:11px; cursor:pointer; background:transparent; color:var(--text3); border:none; font-family:'Noto Sans JP',sans-serif; }
.theme-opt.active { background:var(--surface3); color:var(--text); }

/* LAYOUT */
.layout { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; }
.left-col { flex:0 0 auto; }
.right-col { flex:1 1 220px; display:flex; flex-direction:column; gap:10px; }

/* COLOR BAR */
.color-bar { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.color-btn {
  width:26px; height:26px; border-radius:50%; border:2.5px solid transparent;
  cursor:pointer; transition:transform .1s,border-color .1s;
}
.color-btn:hover { transform:scale(1.15); }
.color-btn.sel { border-color:#fff; transform:scale(1.22); }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(13,1fr); gap:2px; }
.cell {
  width:44px; height:38px; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; font-family:'JetBrains Mono',monospace;
  cursor:pointer; border-radius:3px; position:relative;
  user-select:none; border:1px solid transparent;
  transition:transform .07s,box-shadow .07s; overflow:hidden;
}
.cell:hover { transform:scale(1.12); z-index:20; box-shadow:0 2px 14px rgba(0,0,0,.55); }
.cell.off { background:var(--cell-off); color:var(--cell-off-text); border-color:var(--cell-off-border); }
.cell:not(.off) .cell-label { text-shadow:0 1px 3px rgba(0,0,0,.75); }
.cell.checked .cell-label { color:var(--gold)!important; text-shadow:0 0 8px rgba(240,192,64,.85),0 1px 3px rgba(0,0,0,.8)!important; font-weight:700; }
.cell.checked::after { content:'✓'; position:absolute; top:1px; right:2px; font-size:7px; color:var(--gold); text-shadow:0 0 4px rgba(240,192,64,.7); }
.cell-label { position:relative; z-index:1; pointer-events:none; letter-spacing:-.3px; }
.cell-bg { position:absolute; inset:0; display:flex; }
.cell-seg { height:100%; }
.cell-unfilled { height:100%; background:var(--unfilled); }

/* CAPTURE ROOT */
#captureRoot { border-radius:6px; padding:10px; }
[data-theme="dark"] #captureRoot { background:#0f1117; }
[data-theme="light"] #captureRoot { background:#f0f2f8; }

/* CONTEXT MENU */
.ctx-menu {
  position:fixed; background:var(--surface); border:1px solid var(--border);
  border-radius:9px; padding:6px; z-index:1000; min-width:228px;
  box-shadow:0 8px 32px rgba(0,0,0,.6); display:none;
}
.ctx-title { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:var(--text); padding:4px 8px 8px; border-bottom:1px solid var(--border); margin-bottom:6px; }
.ctx-sec { font-size:10px; color:var(--text3); padding:4px 8px 2px; }
.freq-row { display:flex; align-items:center; gap:6px; padding:3px 6px; border-radius:4px; }
.freq-row:hover { background:var(--surface2); }
.fdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.fname { font-size:11px; color:var(--text2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.finput {
  width:50px; font-size:11px; font-family:'JetBrains Mono',monospace;
  padding:2px 5px; background:var(--surface3); border:1px solid var(--border);
  border-radius:3px; color:var(--text); text-align:right;
}
.fpct { font-size:10px; color:var(--text3); }
.freq-total-row { display:flex; align-items:center; gap:6px; padding:5px 8px 3px; border-top:1px solid var(--border); margin-top:4px; }
.freq-total-label { font-size:10px; color:var(--text3); flex:1; }
.freq-total-val { font-size:12px; font-family:'JetBrains Mono',monospace; font-weight:600; }
.fbar-wrap { padding:4px 8px 5px; }
.fbar { display:flex; height:6px; border-radius:3px; overflow:hidden; background:var(--surface3); }
.fbar-seg { height:100%; }
.ctx-check-row { display:flex; align-items:center; gap:8px; padding:6px 8px; border-top:1px solid var(--border); margin-top:4px; cursor:pointer; border-radius:4px; }
.ctx-check-row:hover { background:var(--surface2); }
.ctx-cb { width:14px; height:14px; border:1px solid var(--border); border-radius:3px; background:var(--surface3); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--gold); flex-shrink:0; }
.ctx-cb-label { font-size:11px; color:var(--text2); }
.ctx-rm { width:100%; padding:5px; margin-top:4px; background:transparent; border:1px solid #6e2828; border-radius:4px; color:#e86060; font-size:11px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.ctx-rm:hover { background:#3a1515; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 13px; }
.card-title { font-size:10px; color:var(--text3); margin-bottom:8px; letter-spacing:.07em; text-transform:uppercase; }

/* LEGEND */
.legend-items { display:flex; flex-direction:column; gap:3px; }
.legend-item { display:flex; align-items:center; gap:7px; padding:4px 6px; border-radius:5px; cursor:pointer; border:1px solid transparent; transition:background .1s; }
.legend-item:hover { background:var(--surface2); }
.legend-item.sel { border-color:var(--border); background:var(--surface2); }
.ldot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.lname { font-size:12px; color:var(--text); flex:1; }
.lpct { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text3); }

/* STATS */
.range-pct { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:600; color:var(--text); margin-bottom:3px; }
.range-combos { font-size:11px; color:var(--text2); margin-bottom:10px; }
.color-stats { display:flex; flex-direction:column; gap:4px; }
.cstat { display:flex; align-items:center; gap:6px; }
.cstat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cstat-name { font-size:11px; color:var(--text2); flex:1; }
.cstat-val { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text); }

/* CTRL */
.ctrl-btn { padding:7px 11px; border-radius:6px; cursor:pointer; font-size:12px; font-family:'Noto Sans JP',sans-serif; font-weight:500; border:1px solid var(--border); background:var(--surface2); color:var(--text2); transition:background .1s,color .1s; width:100%; }
.ctrl-btn:hover { background:var(--surface3); color:var(--text); }
.ctrl-btn.export { border-color:#405a30; color:#60a840; background:#1a2a10; }
.ctrl-btn.export:hover { background:#223515; }
[data-theme="light"] .ctrl-btn.export { background:#d4f0c0; color:#2a6010; border-color:#90c060; }

/* TOAST */
.toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 16px; font-size:13px; color:var(--text); z-index:2000; display:none; box-shadow:0 4px 20px rgba(0,0,0,.5); white-space:nowrap; }
.toast.show { display:block; }

@media(max-width:600px){ .cell{width:26px;height:24px;font-size:7px;} .layout{flex-direction:column;} }
</style>
</head>
<body>

<div class="titlebar">
  <span class="title">POKER RANGE BUILDER <span class="save-dot" id="saveDot"></span></span>
  <div style="display:flex;gap:6px;align-items:center;">
    <button class="icon-btn" onclick="selectAll()" title="すべて選択">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button class="icon-btn" onclick="clearAll()" title="すべてクリア" style="color:#e86060">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
    <div class="gear-wrap" id="gearWrap">
      <button class="icon-btn" onclick="toggleGear()" title="設定">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <div class="gear-dd" id="gearDD">
        <div class="dd-sec">色名を編集</div>
        <div id="ddColorRows"></div>
        <div class="dd-sep"></div>
        <div class="dd-sec" style="display:flex;align-items:center;">
          <span style="flex:1">テーマ</span>
          <div class="theme-toggle">
            <button class="theme-opt active" id="btnDark" onclick="setTheme('dark')">ダーク</button>
            <button class="theme-opt" id="btnLight" onclick="setTheme('light')">ライト</button>
          </div>
        </div>
        <div class="dd-sep"></div>
        <div class="dd-sec">書き出し</div>
        <button class="dd-btn" onclick="exportPng('current');closeGear()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PNG（現在のテーマ）
        </button>
        <button class="dd-btn" onclick="exportBoth();closeGear()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PNG × 2（ライト＋ダーク）
        </button>
      </div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="left-col">
    <div class="color-bar" id="colorBar"></div>
    <div id="captureRoot">
      <div class="grid" id="grid"></div>
    </div>
  </div>
  <div class="right-col">
    <div class="card">
      <div class="card-title">色を選択してクリック</div>
      <div class="legend-items" id="legendItems"></div>
    </div>
    <div class="card">
      <div class="card-title">レンジ統計</div>
      <div class="range-pct" id="rangePct">0.0%</div>
      <div class="range-combos" id="rangeCombos">0.0 / 1326 コンボ</div>
      <div class="color-stats" id="colorStats"></div>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:6px;">
      <button class="ctrl-btn export" onclick="exportPng('current')">↓ PNG ダウンロード</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-title" id="ctxTitle">Hand</div>
  <div class="ctx-sec">各色の頻度（%）</div>
  <div id="ctxFreqRows"></div>
  <div class="fbar-wrap"><div class="fbar" id="ctxFbar"></div></div>
  <div class="freq-total-row">
    <span class="freq-total-label">合計</span>
    <span class="freq-total-val" id="ctxTotal">0%</span>
  </div>
  <div class="ctx-check-row" onclick="toggleCheck()">
    <div class="ctx-cb" id="ctxCb"></div>
    <span class="ctx-cb-label">チェックマーク（金文字）</span>
  </div>
  <button class="ctx-rm" onclick="removeHand()">このハンドを削除</button>
</div>

<div class="toast" id="toast"></div>

<script>
const RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
const COLORS=[
  {id:1,name:'5bet+',           bright:'#cc2255'},
  {id:2,name:'4bet Allin',      bright:'#b090e0'},
  {id:3,name:'4bet / 5bet fold',bright:'#ff5522'},
  {id:4,name:'3bet call',       bright:'#4090ff'},
  {id:5,name:'RFI / 3bet fold', bright:'#f0c800'},
  {id:6,name:'Call',            bright:'#30c890'},
];

const HS={};
RANKS.forEach((_,r)=>RANKS.forEach((_,c)=>{ HS[r+'_'+c]={colors:{},checked:false}; }));
let SEL=1, ctxKey=null;

/* helpers */
function hn(r,c){ return r===c?RANKS[r]+RANKS[c]:r<c?RANKS[r]+RANKS[c]+'s':RANKS[c]+RANKS[r]+'o'; }
function hc(r,c){ return r===c?6:r<c?4:12; }
function active(k){ return Object.values(HS[k].colors).some(v=>v>0); }

/* LS */
const LSK='prb_v2';
function save(){
  try{
    const d={names:COLORS.map(c=>c.name),theme:document.documentElement.dataset.theme,hs:{}};
    RANKS.forEach((_,r)=>RANKS.forEach((_,c)=>{
      const k=r+'_'+c,s=HS[k];
      if(active(k)||s.checked) d.hs[k]={colors:{...s.colors},checked:s.checked};
    }));
    localStorage.setItem(LSK,JSON.stringify(d));
    const dot=document.getElementById('saveDot');
    dot.classList.add('on'); clearTimeout(dot._t);
    dot._t=setTimeout(()=>dot.classList.remove('on'),1200);
  }catch(e){}
}
let st;
function scheduleSave(){ clearTimeout(st); st=setTimeout(save,600); }
function loadSave(){
  try{
    const raw=localStorage.getItem(LSK); if(!raw)return;
    const d=JSON.parse(raw);
    if(d.theme) setTheme(d.theme,true);
    if(d.names) d.names.forEach((n,i)=>{ if(COLORS[i]) COLORS[i].name=n; });
    if(d.hs) Object.entries(d.hs).forEach(([k,v])=>{ if(HS[k]) HS[k]={colors:v.colors||{},checked:!!v.checked}; });
  }catch(e){}
}

/* theme */
function setTheme(t,skip){
  document.documentElement.dataset.theme=t;
  document.getElementById('btnDark').classList.toggle('active',t==='dark');
  document.getElementById('btnLight').classList.toggle('active',t==='light');
  if(!skip) scheduleSave();
}

/* gear */
function toggleGear(){
  const dd=document.getElementById('gearDD');
  if(dd.classList.toggle('open')) buildDdRows();
}
function closeGear(){ document.getElementById('gearDD').classList.remove('open'); }
document.addEventListener('click',e=>{ if(!e.target.closest('#gearWrap')) closeGear(); });
function buildDdRows(){
  const el=document.getElementById('ddColorRows'); el.innerHTML='';
  COLORS.forEach(col=>{
    const row=document.createElement('div'); row.className='dd-crow';
    row.innerHTML=`<div class="dd-dot" style="background:${col.bright}"></div><input class="dd-inp" type="text" value="${col.name}">`;
    row.querySelector('input').oninput=function(){ col.name=this.value; buildLegend(); setColor(SEL); updateStats(); scheduleSave(); };
    el.appendChild(row);
  });
}

/* color bar & legend */
function buildColorBar(){
  const bar=document.getElementById('colorBar'); bar.innerHTML='';
  COLORS.forEach(col=>{
    const b=document.createElement('div');
    b.className='color-btn'+(col.id===SEL?' sel':'');
    b.style.background=col.bright; b.title=col.name;
    b.onclick=()=>setColor(col.id); bar.appendChild(b);
  });
}
function buildLegend(){
  const el=document.getElementById('legendItems'); el.innerHTML='';
  COLORS.forEach(col=>{
    const item=document.createElement('div');
    item.className='legend-item'+(col.id===SEL?' sel':'');
    item.id='leg_'+col.id; item.onclick=()=>setColor(col.id);
    item.innerHTML=`<div class="ldot" style="background:${col.bright}"></div><span class="lname">${col.name}</span><span class="lpct" id="lpct_${col.id}">0.0%</span>`;
    el.appendChild(item);
  });
}
function setColor(id){
  SEL=id;
  document.querySelectorAll('.color-btn').forEach((b,i)=>b.classList.toggle('sel',COLORS[i].id===id));
  document.querySelectorAll('.legend-item').forEach((b,i)=>b.classList.toggle('sel',COLORS[i].id===id));
}

/* grid */
function buildGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  RANKS.forEach((_,ri)=>RANKS.forEach((_,ci)=>{
    const k=ri+'_'+ci, cell=document.createElement('div');
    cell.className='cell off'; cell.id='cell_'+k;
    cell.innerHTML=`<div class="cell-bg" id="bg_${k}"></div><span class="cell-label" id="lbl_${k}">${hn(ri,ci)}</span>`;
    cell.onclick=e=>handleClick(k,e);
    cell.oncontextmenu=e=>{ e.preventDefault(); openCtx(k,e); };
    g.appendChild(cell);
  }));
}

function updateCell(k){
  const cell=document.getElementById('cell_'+k);
  const bg=document.getElementById('bg_'+k);
  const lbl=document.getElementById('lbl_'+k);
  const s=HS[k], on=active(k);
  cell.className='cell'+(on?'':' off')+(s.checked?' checked':'');
  lbl.style.color='';
  if(!on){ bg.innerHTML=''; return; }
  const entries=Object.entries(s.colors).filter(([,v])=>v>0);
  const total=entries.reduce((a,[,v])=>a+v,0);
  bg.innerHTML='';
  entries.forEach(([cid,val])=>{
    const col=COLORS[parseInt(cid)-1];
    const seg=document.createElement('div');
    seg.className='cell-seg';
    seg.style.width=val+'%';
    seg.style.background=col.bright;
    bg.appendChild(seg);
  });
  if(total<100){
    const r=document.createElement('div');
    r.className='cell-unfilled'; r.style.width=(100-total)+'%';
    bg.appendChild(r);
  }
  if(s.checked) lbl.style.color='var(--gold)';
}

/* click */
function handleClick(k,e){
  const s=HS[k];
  if(!active(k)){ s.colors={[SEL]:100}; }
  else if(s.colors[SEL]>0){ delete s.colors[SEL]; }
  else { s.colors[SEL]=50; }
  updateCell(k); updateStats(); scheduleSave();
}

/* context */
function openCtx(k,e){
  ctxKey=k;
  const [ri,ci]=k.split('_').map(Number), s=HS[k];
  if(!active(k)){ s.colors={[SEL]:100}; updateCell(k); updateStats(); }
  document.getElementById('ctxTitle').textContent=hn(ri,ci)+' — 頻度設定';
  renderCtxRows(k);
  const m=document.getElementById('ctxMenu');
  m.style.display='block';
  m.style.left=Math.min(e.clientX,window.innerWidth-240)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-360)+'px';
}
function renderCtxRows(k){
  const s=HS[k], rows=document.getElementById('ctxFreqRows');
  rows.innerHTML='';
  COLORS.forEach(col=>{
    const val=s.colors[col.id]||0;
    const row=document.createElement('div'); row.className='freq-row';
    row.innerHTML=`<div class="fdot" style="background:${col.bright}"></div><span class="fname">${col.name}</span><input class="finput" type="number" min="0" max="100" step="5" value="${val}" oninput="setFreq('${k}',${col.id},this.value)"><span class="fpct">%</span>`;
    rows.appendChild(row);
  });
  renderFbar(k);
  document.getElementById('ctxCb').textContent=s.checked?'✓':'';
}
function setFreq(k,cid,val){
  const s=HS[k];
  val=Math.max(0,Math.min(100,parseInt(val)||0));
  if(val===0) delete s.colors[cid]; else s.colors[cid]=val;
  renderFbar(k); updateCell(k); updateStats(); scheduleSave();
}
function renderFbar(k){
  const s=HS[k], bar=document.getElementById('ctxFbar'), tv=document.getElementById('ctxTotal');
  bar.innerHTML='';
  const entries=Object.entries(s.colors).filter(([,v])=>v>0);
  const total=entries.reduce((a,[,v])=>a+v,0);
  tv.textContent=total+'%';
  tv.style.color=(total===100||total===0)?'var(--text)':'#f0c800';
  if(!total) return;
  entries.forEach(([cid,val])=>{
    const col=COLORS[parseInt(cid)-1];
    const seg=document.createElement('div'); seg.className='fbar-seg';
    seg.style.width=(val/total*100)+'%'; seg.style.background=col.bright;
    bar.appendChild(seg);
  });
}
function toggleCheck(){
  if(!ctxKey) return;
  HS[ctxKey].checked=!HS[ctxKey].checked;
  document.getElementById('ctxCb').textContent=HS[ctxKey].checked?'✓':'';
  updateCell(ctxKey); scheduleSave();
}
function removeHand(){
  if(!ctxKey) return;
  HS[ctxKey]={colors:{},checked:false};
  updateCell(ctxKey); updateStats(); scheduleSave(); closeCtx();
}
function closeCtx(){ document.getElementById('ctxMenu').style.display='none'; ctxKey=null; }
document.addEventListener('click',e=>{ if(!e.target.closest('#ctxMenu')&&!e.target.closest('.cell')) closeCtx(); });

/* stats */
function updateStats(){
  const by={};COLORS.forEach(c=>by[c.id]=0);
  let total=0;
  RANKS.forEach((_,ri)=>RANKS.forEach((_,ci)=>{
    const k=ri+'_'+ci,s=HS[k],combos=hc(ri,ci);
    const entries=Object.entries(s.colors).filter(([,v])=>v>0);
    const sum=entries.reduce((a,[,v])=>a+v,0);
    if(!sum) return;
    entries.forEach(([cid,val])=>{ const e=(val/sum)*combos; by[parseInt(cid)]+=e; total+=e; });
  }));
  document.getElementById('rangePct').textContent=(total/1326*100).toFixed(1)+'%';
  document.getElementById('rangeCombos').textContent=total.toFixed(1)+' / 1326 コンボ';
  const el=document.getElementById('colorStats'); el.innerHTML='';
  COLORS.forEach(col=>{
    const v=by[col.id];
    const lpct=document.getElementById('lpct_'+col.id);
    if(lpct) lpct.textContent=(v/1326*100).toFixed(1)+'%';
    if(v<0.05) return;
    const row=document.createElement('div'); row.className='cstat';
    row.innerHTML=`<div class="cstat-dot" style="background:${col.bright}"></div><span class="cstat-name">${col.name}</span><span class="cstat-val">${v.toFixed(1)} (${(v/1326*100).toFixed(1)}%)</span>`;
    el.appendChild(row);
  });
}

/* bulk */
function selectAll(){
  RANKS.forEach((_,ri)=>RANKS.forEach((_,ci)=>{
    const k=ri+'_'+ci;
    if(!active(k)){ HS[k].colors={[SEL]:100}; updateCell(k); }
  }));
  updateStats(); scheduleSave();
}
function clearAll(){
  RANKS.forEach((_,ri)=>RANKS.forEach((_,ci)=>{ HS[ri+'_'+ci]={colors:{},checked:false}; updateCell(ri+'_'+ci); }));
  updateStats(); scheduleSave();
}

/* export */
async function getCanvas(theme){
  const root=document.getElementById('captureRoot');
  const cur=document.documentElement.dataset.theme;
  if(theme!==cur) document.documentElement.dataset.theme=theme;
  const bg=theme==='light'?'#f0f2f8':'#0f1117';
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const canvas=await html2canvas(root,{backgroundColor:bg,scale:2,useCORS:true,logging:false});
  if(theme!==cur) document.documentElement.dataset.theme=cur;
  return canvas;
}
function dl(canvas,name){ const a=document.createElement('a'); a.download=name; a.href=canvas.toDataURL('image/png'); a.click(); }
async function exportPng(mode){
  showToast('画像を生成中…');
  try{
    const t=document.documentElement.dataset.theme;
    dl(await getCanvas(t),'poker-range-'+t+'.png');
    showToast('PNG をダウンロードしました ✓');
  }catch(err){ showToast('エラー: '+err.message); }
}
async function exportBoth(){
  showToast('2枚の画像を生成中…');
  try{
    dl(await getCanvas('dark'),'poker-range-dark.png');
    await new Promise(r=>setTimeout(r,400));
    dl(await getCanvas('light'),'poker-range-light.png');
    showToast('ライト＋ダーク PNG をダウンロードしました ✓');
  }catch(err){ showToast('エラー: '+err.message); }
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.classList.remove('show'),3000);
}

/* init */
loadSave();
buildColorBar(); buildLegend(); buildGrid();
RANKS.forEach((_,ri)=>RANKS.forEach((_,ci)=>updateCell(ri+'_'+ci)));
updateStats();
</script>
